version: 2

build:
  os: ubuntu-lts-latest
  tools:
    python: "3.12"
  jobs:
    post_build:
      - python -m pagefind --include-characters "_-./:+#<>" --exclude-selectors "a.headerlink" --site "$READTHEDOCS_OUTPUT/html"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

formats:
  - pdf
  - epub

python:
  install:
    - requirements: docs/requirements.txt
