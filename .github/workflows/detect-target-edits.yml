#
# The purpose of this short job is to filter pull request `edited` events to 
# only those that represent changes in the pull request merge target. Other
# edits such as to title or to initial comment/description will not trigger
# more CI. But, a change in the pull request target will.
#
# The workflow outputs `run_build='true'` or `run_build=''`. When the PR has
# been edited AND the edit involves a change of the PR's base (e.g. merge
# target has changed) the output is `run_build=='true'`. Otherwise, the output
# is `run_build=''`. These outputs are then captured in other workflow's
# `${{ needs.xxx.outputs.run_build }}` which evalutes to either `'true'` or
# `''` (empty) which is treated as false.
#
name: Detect merge target edits

on:
  workflow_call:
    outputs:
      run_build:
        description: "Decide whether merge target was edited"
        value: ${{ jobs.merge_target_edited.outputs.run_build }}

jobs:
  merge_target_edited:
    runs-on: ubuntu-latest
    outputs:
      run_build: ${{ steps.target_edited.outputs.build }}
    steps:
      - name: Detect merge target edits
        id: target_edited
        if: >
          github.event_name == 'pull_request' && 
          github.event.action == 'edited' && 
          github.event.changes.base
        run: echo "build=true" >> "$GITHUB_OUTPUT"
